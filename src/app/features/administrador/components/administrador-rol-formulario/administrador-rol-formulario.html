<app-modal size="md" (closed)="closeModal()">
  <header class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
    <h3 class="text-lg font-bold text-slate-800">
      {{ mode() === 'create' ? 'Crear rol' : 'Editar rol' }}
    </h3>
    <app-button type="button" variant="secondary" size="sm" (click)="closeModal()">
      Cerrar
    </app-button>
  </header>

  <form [formGroup]="form" (ngSubmit)="submitForm()" class="p-6 grid gap-4">
    <app-input
      type="text"
      formControlName="nombre"
      label="Nombre del rol"
      placeholder="Ejemplo: SUPERVISOR"
      controlClass="disabled:bg-slate-100"
      [error]="form.controls.nombre.touched && form.controls.nombre.invalid ? 'Usa formato A-Z, 0-9 o _ con longitud entre 3 y 30.' : null"
    />

    <app-textarea
      formControlName="descripcion"
      label="Descripcion (opcional)"
      placeholder="Describe para que sirve este rol"
      [rows]="4"
      [error]="form.controls.descripcion.touched && form.controls.descripcion.invalid ? 'La descripcion supera el maximo permitido.' : null"
    />

    @if (mode() === 'edit') {
      <label class="inline-flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" formControlName="activo" class="h-4 w-4" />
        Rol activo
      </label>
    }

    @if (serverError()) {
      <app-alert variant="danger">
        <p class="text-sm">{{ serverError() }}</p>
      </app-alert>
    }

    <footer class="pt-2 flex justify-end gap-3">
      <app-button type="button" variant="secondary" (click)="closeModal()">
        Cancelar
      </app-button>
      <app-button
        type="submit"
        [disabled]="pending()"
        [pending]="pending()"
        pendingLabel="Guardando..."
      >
        {{ mode() === 'create' ? 'Crear rol' : 'Guardar cambios' }}
      </app-button>
    </footer>
  </form>
</app-modal>
