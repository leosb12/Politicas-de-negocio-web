<app-modal size="md" (closed)="closeModal()">
  <header class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
    <h3 class="text-lg font-bold text-slate-800">
      {{ mode() === 'create' ? 'Crear departamento' : 'Editar departamento' }}
    </h3>
    <app-button type="button" variant="secondary" size="sm" (click)="closeModal()">
      Cerrar
    </app-button>
  </header>

  <form [formGroup]="form" (ngSubmit)="submitForm()" class="grid gap-4 p-6">
    <app-input
      formControlName="nombre"
      label="Nombre"
      placeholder="Ejemplo: Atencion al cliente"
      [error]="form.controls.nombre.touched && form.controls.nombre.invalid ? 'El nombre debe tener entre 3 y 80 caracteres.' : null"
    />

    <app-textarea
      formControlName="descripcion"
      label="Descripcion"
      placeholder="Describe el objetivo del departamento"
      [rows]="4"
      [error]="form.controls.descripcion.touched && form.controls.descripcion.invalid ? 'La descripcion supera el maximo permitido.' : null"
    />

    @if (mode() === 'edit') {
      <label class="inline-flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" formControlName="activo" class="h-4 w-4" />
        Departamento activo
      </label>
    }

    @if (serverError()) {
      <app-alert variant="danger">
        <p class="text-sm">{{ serverError() }}</p>
      </app-alert>
    }

    <footer class="flex justify-end gap-3 pt-2">
      <app-button type="button" variant="secondary" (click)="closeModal()">
        Cancelar
      </app-button>
      <app-button
        type="submit"
        [disabled]="pending()"
        [pending]="pending()"
        pendingLabel="Guardando..."
      >
        {{ mode() === 'create' ? 'Crear departamento' : 'Guardar cambios' }}
      </app-button>
    </footer>
  </form>
</app-modal>
