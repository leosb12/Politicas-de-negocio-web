<section class="rounded-2xl bg-white border border-slate-200 shadow-sm overflow-hidden">
  <div class="border-b border-slate-200 bg-slate-50 px-5 py-3">
    <ng-content select="[table-toolbar]" />
  </div>

  <div class="overflow-x-auto">
    @if (loading()) {
      <div class="p-10 text-center text-slate-500">Cargando datos...</div>
    } @else if (!hasData()) {
      <div class="p-10 text-center">
        <h3 class="text-lg font-semibold text-slate-700">{{ emptyTitle() }}</h3>
        <p class="mt-2 text-sm text-slate-500">{{ emptyMessage() }}</p>
      </div>
    } @else {
      <table class="min-w-full text-sm">
        <thead class="bg-slate-100 text-slate-600 uppercase tracking-wide text-xs">
          <tr>
            @for (column of columns(); track column) {
              <th class="px-4 py-3 text-left font-semibold">{{ column }}</th>
            }
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-200 text-slate-700">
          <ng-content select="[table-body]" />
        </tbody>
      </table>
    }
  </div>
</section>
