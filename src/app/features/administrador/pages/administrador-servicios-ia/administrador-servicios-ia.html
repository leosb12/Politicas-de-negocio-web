<section class="space-y-6">
  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <h1 class="flex items-center gap-2 text-3xl font-bold tracking-tight text-slate-900">
          <lucide-icon name="sparkles" [size]="30" class="text-sky-600"></lucide-icon>
          Servicios IA
        </h1>
        <p class="mt-2 max-w-3xl text-sm text-slate-500">
          Accede desde un solo lugar a los servicios inteligentes del panel: simulacion, historial de resultados y comparacion de politicas.
        </p>
      </div>

      <app-badge variant="info">Panel admin</app-badge>
    </div>
  </div>

  <div class="grid gap-5 xl:grid-cols-3">
    @for (card of serviceCards(); track card.key) {
      <button
        type="button"
        class="service-card group text-left"
        [class.service-card--disabled]="!card.enabled"
        (click)="openService(card.key)"
        [disabled]="!card.enabled"
      >
        <app-card className="h-full p-6 transition duration-200 group-enabled:hover:-translate-y-1 group-enabled:hover:shadow-lg {{ card.tone }}">
          <div class="flex items-start justify-between gap-3">
            <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/80 text-slate-700 shadow-sm">
              <lucide-icon [name]="card.icon" [size]="22"></lucide-icon>
            </div>
            <app-badge [variant]="card.enabled ? 'success' : 'warning'">
              {{ card.badge }}
            </app-badge>
          </div>

          <h3 class="mt-5 text-xl font-semibold text-slate-900">{{ card.title }}</h3>
          <p class="mt-3 text-sm leading-6 text-slate-600">
            {{ card.description }}
          </p>
          <p class="mt-4 text-sm font-medium text-slate-500">
            {{ card.helper }}
          </p>

          <div class="mt-6 flex items-center gap-2 text-sm font-semibold text-sky-700">
            Ir al servicio
            <lucide-icon name="arrow-left-right" [size]="16"></lucide-icon>
          </div>
        </app-card>
      </button>
    }
  </div>
</section>
