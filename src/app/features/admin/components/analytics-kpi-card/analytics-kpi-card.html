<section [class]="'analytics-kpi-card analytics-kpi-card--gradient p-5 ' + toneClasses()">
  <div class="analytics-kpi-card__glow"></div>
  <div class="analytics-kpi-card__content">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-white/70">
          {{ title() }}
        </p>
        <p class="mt-3 text-3xl font-bold tracking-tight text-white">{{ value() }}</p>
      </div>

      <div class="analytics-kpi-card__icon">
        <lucide-icon [name]="icon()" [size]="18"></lucide-icon>
      </div>
    </div>

    @if (subtitle() || chip()) {
      <div class="mt-4 flex flex-wrap items-center gap-2">
        @if (chip()) {
          <span class="analytics-kpi-card__chip">{{ chip() }}</span>
        }

        @if (subtitle()) {
          <p class="text-sm text-white/75">{{ subtitle() }}</p>
        }
      </div>
    }

    @if (progress() !== null) {
      <div class="mt-4 space-y-2">
        <div class="analytics-kpi-card__progress-track">
          <span
            class="analytics-kpi-card__progress-fill"
            [style.width.%]="progress()"
          ></span>
        </div>
        <p class="text-xs uppercase tracking-[0.2em] text-white/55">
          {{ progress() }}% del total observado
        </p>
      </div>
    }
  </div>
</section>
