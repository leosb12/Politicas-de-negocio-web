<div class="min-h-screen bg-slate-100">
  <app-header />

  <main class="mx-auto grid w-full max-w-7xl gap-6 px-4 py-6 sm:px-6 lg:px-8">
    <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
      <p class="text-sm uppercase tracking-wide text-slate-500">Panel del funcionario</p>

      <p class="mt-2 text-sm text-slate-600">

      </p>

    <section class="grid gap-4 md:grid-cols-3">
      <article class="rounded-2xl border border-red-200 bg-red-50 p-5 shadow-sm">

        </p>

      <article class="rounded-2xl border border-amber-200 bg-amber-50 p-5 shadow-sm">

        <p class="mt-2 text-sm text-amber-600">
          Tareas que estas gestionando en este momento.
        </p>
      </article>

      <article class="rounded-2xl border border-emerald-200 bg-emerald-50 p-5 shadow-sm">
        <h3 class="text-lg font-bold text-emerald-700">Completadas</h3>
        <p class="mt-2 text-sm text-emerald-600">

        </p>
