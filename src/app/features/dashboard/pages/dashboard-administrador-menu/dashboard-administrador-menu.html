<div class="dashboard-admin-menu-shell min-h-screen">
  <app-header />

  <main class="mx-auto flex w-full max-w-7xl flex-col gap-8 px-4 py-6 sm:px-6 lg:px-8">
    <section class="dashboard-admin-menu-hero overflow-hidden rounded-[2rem] border border-white/70 p-8 text-slate-950 shadow-2xl shadow-slate-950/10">
      <div class="dashboard-admin-menu-hero__orb dashboard-admin-menu-hero__orb--one"></div>
      <div class="dashboard-admin-menu-hero__orb dashboard-admin-menu-hero__orb--two"></div>

      <div class="relative z-10 flex flex-col gap-4 lg:max-w-3xl">
        <span class="inline-flex w-fit rounded-full border border-amber-200 bg-white/85 px-4 py-1 text-xs font-semibold uppercase tracking-[0.28em] text-amber-700 backdrop-blur">
          Panel de administracion
        </span>
        <div>
          <h2 class="text-3xl font-black tracking-tight sm:text-5xl">
            Gestiona el sistema {{ usuario?.nombre }}
          </h2>
          <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
            Elige el modulo que quieres administrar. Cada acceso te lleva directo a la vista correcta para mantener el flujo modular y escalable.
          </p>
        </div>
      </div>
    </section>

    <section class="grid gap-5 lg:grid-cols-3">
      @for (card of cards; track card.routerLink) {
        <app-dashboard-navigation-card
          [chip]="card.chip"
          [title]="card.title"
          [description]="card.description"
          [footerLabel]="card.footerLabel"
          [routerLink]="card.routerLink"
          [tone]="card.tone"
        />
      }
    </section>
  </main>
</div>
