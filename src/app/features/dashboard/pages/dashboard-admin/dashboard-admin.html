<div class="dashboard-admin-shell min-h-screen">
  <app-header />

  <main class="mx-auto flex w-full max-w-7xl flex-col gap-8 px-4 py-6 sm:px-6 lg:px-8">
    <section class="dashboard-admin-hero overflow-hidden rounded-[2rem] border border-white/60 p-8 text-slate-950 shadow-2xl shadow-sky-950/10">
      <div class="dashboard-admin-hero__glow dashboard-admin-hero__glow--one"></div>
      <div class="dashboard-admin-hero__glow dashboard-admin-hero__glow--two"></div>

      <div class="relative z-10 flex flex-col gap-4 lg:max-w-3xl">
        <span class="inline-flex w-fit rounded-full border border-sky-200 bg-white/80 px-4 py-1 text-xs font-semibold uppercase tracking-[0.28em] text-sky-700 backdrop-blur">
          Panel de administrador
        </span>
        <div>
          <h2 class="text-3xl font-black tracking-tight sm:text-5xl">
            Bienvenido, {{ usuario?.nombre }}
          </h2>
          <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
            Administra el sistema desde un panel mas claro, rapido y visual. Aqui tienes acceso directo a los tres modulos clave del entorno administrativo.
          </p>
        </div>
      </div>
    </section>

    <section class="grid gap-5 lg:grid-cols-3">
      <app-dashboard-navigation-card
        chip="Modulo principal"
        title="Politicas de Negocio"
        description="Entra a un menu intermedio para gestionar politicas, simulaciones con IA y comparacion de politicas desde accesos mas claros."
        footerLabel="Ver opciones del modulo"
        routerLink="/dashboard-admin/politicas-negocio"
        tone="emerald"
      />

      <app-dashboard-navigation-card
        chip="Vision operativa"
        title="Analitica"
        description="Abre un submenu para entrar a las analiticas generales o ir directo al analisis con IA del sistema."
        footerLabel="Ver opciones de analitica"
        routerLink="/dashboard-admin/analitica"
        tone="sky"
      />

      <app-dashboard-navigation-card
        chip="Administracion"
        title="Panel de administrador"
        description="Abre el panel central para gestionar usuarios, roles y departamentos desde accesos separados y claros."
        footerLabel="Abrir panel"
        routerLink="/dashboard-admin/administracion"
        tone="amber"
      />
    </section>
  </main>
</div>
