<app-card className="overflow-hidden">
  <div class="border-b border-slate-200 bg-slate-50 px-5 py-4">
    <h3 class="text-base font-semibold text-slate-900">{{ titulo() }}</h3>
  </div>

  @if (orderedEvents().length === 0) {
    <div class="px-5 py-8">
      <h4 class="text-sm font-semibold text-slate-900">{{ emptyTitle() }}</h4>
      <p class="mt-1 text-sm text-slate-600">{{ emptyMessage() }}</p>
    </div>
  } @else {
    <app-table>
      <thead class="bg-slate-100 text-xs uppercase tracking-wide text-slate-600">
        <tr>
          <th class="px-4 py-3 text-left font-semibold">Fecha</th>
          <th class="px-4 py-3 text-left font-semibold">Accion</th>
          <th class="px-4 py-3 text-left font-semibold">Usuario</th>
          <th class="px-4 py-3 text-left font-semibold">Detalle</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200 text-slate-700">
        @for (event of orderedEvents(); track event.id) {
          <tr>
            <td class="px-4 py-3 align-top text-sm">
              {{ event.fecha | date : 'medium' }}
            </td>
            <td class="px-4 py-3 align-top">
              <app-badge [variant]="accionVariant(event.accion)">
                {{ event.accion }}
              </app-badge>
            </td>
            <td class="px-4 py-3 align-top text-sm">
              {{ event.usuario ?? '-' }}
            </td>
            <td class="px-4 py-3 align-top text-sm">
              {{ event.detalle ?? '-' }}
            </td>
          </tr>
        }
      </tbody>
    </app-table>
  }
</app-card>
