<div class="fixed right-4 top-4 z-[100] flex w-[min(24rem,95vw)] flex-col gap-2">
  @for (toast of toastService.toasts(); track toast.id) {
    <article
      class="rounded-xl border px-4 py-3 shadow-lg backdrop-blur"
      [class]="
        toast.type === 'success'
          ? 'border-emerald-300 bg-emerald-50 text-emerald-900'
          : toast.type === 'error'
            ? 'border-rose-300 bg-rose-50 text-rose-900'
            : 'border-sky-300 bg-sky-50 text-sky-900'
      "
    >
      <div class="flex items-start justify-between gap-3">
        <div>
          <h4 class="font-semibold">{{ toast.title }}</h4>
          <p class="mt-1 text-sm opacity-90">{{ toast.message }}</p>
        </div>
        <button
          type="button"
          (click)="toastService.remove(toast.id)"
          class="rounded-md px-2 py-1 text-xs font-semibold hover:bg-black/5"
        >
          Cerrar
        </button>
      </div>
    </article>
  }
</div>
