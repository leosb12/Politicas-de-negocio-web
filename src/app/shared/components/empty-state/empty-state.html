<div class="px-6 py-12 text-center">
  <h3 class="text-lg font-semibold text-slate-700">{{ title() }}</h3>
  <p class="mt-2 text-sm text-slate-500">{{ message() }}</p>

  @if (actionLabel()) {
    <app-button
      type="button"
      variant="secondary"
      className="mt-5"
      (click)="onAction()"
    >
      {{ actionLabel() }}
    </app-button>
  }
</div>
