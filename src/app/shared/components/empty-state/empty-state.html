<div class="px-6 py-12 text-center">
  <h3 class="text-lg font-semibold text-slate-700">{{ title() }}</h3>
  <p class="mt-2 text-sm text-slate-500">{{ message() }}</p>

  @if (actionLabel()) {
    <button
      type="button"
      (click)="onAction()"
      class="mt-5 rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
    >
      {{ actionLabel() }}
    </button>
  }
</div>
