<a [routerLink]="routerLink()" [class]="cardClasses()">
  <div class="dashboard-navigation-card__chip">{{ chip() }}</div>

  <div class="space-y-3">
    <h3 class="text-2xl font-black text-slate-950">{{ title() }}</h3>
    <p class="text-sm leading-6 text-slate-600">
      {{ description() }}
    </p>
  </div>

  <div class="dashboard-navigation-card__footer">
    <span>{{ footerLabel() }}</span>
    <span aria-hidden="true">-></span>
  </div>
</a>
