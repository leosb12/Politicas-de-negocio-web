<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4 backdrop-blur-sm">
  <section class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-xl">
    <h3 class="text-lg font-bold text-slate-900">{{ title() }}</h3>
    <p class="mt-2 text-sm text-slate-600">{{ message() }}</p>

    <div class="mt-6 flex justify-end gap-3">
      <button
        type="button"
        (click)="onCancel()"
        [disabled]="pending()"
        class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100 disabled:opacity-60"
      >
        {{ cancelLabel() }}
      </button>
      <button
        type="button"
        (click)="onConfirm()"
        [disabled]="pending()"
        [class]="
          danger()
            ? 'rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700 disabled:opacity-60'
            : 'rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:opacity-60'
        "
      >
        {{ pending() ? 'Procesando...' : confirmLabel() }}
      </button>
    </div>
  </section>
</div>
