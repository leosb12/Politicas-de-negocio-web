<app-modal size="sm" (closed)="onCancel()" [closeOnBackdrop]="!pending()">
  <section class="p-6">
    <h3 class="text-lg font-bold text-slate-900">{{ title() }}</h3>
    <p class="mt-2 text-sm text-slate-600">{{ message() }}</p>

    <div class="mt-6 flex justify-end gap-3">
      <app-button type="button" variant="secondary" (click)="onCancel()" [disabled]="pending()">
        {{ cancelLabel() }}
      </app-button>
      <app-button
        type="button"
        (click)="onConfirm()"
        [disabled]="pending()"
        [pending]="pending()"
        pendingLabel="Procesando..."
        [variant]="danger() ? 'danger' : 'primary'"
      >
        {{ confirmLabel() }}
      </app-button>
    </div>
  </section>
</app-modal>
