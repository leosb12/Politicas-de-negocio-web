name: politicas-negocio-local

services:
  backend:
    build:
      context: ../politicas-de-negocio
      dockerfile: Dockerfile
    image: politicas-negocio-backend:local
    container_name: politicas-negocio-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      MONGODB_URI: ${MONGODB_URI:?Define MONGODB_URI con tu conexion de MongoDB Atlas}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-politicas_negocio_db}
      APP_STORAGE_TYPE: ${APP_STORAGE_TYPE:-local}
      APP_STORAGE_LOCAL_BASE_PATH: ${APP_STORAGE_LOCAL_BASE_PATH:-uploads}
      APP_STORAGE_S3_BUCKET: ${APP_STORAGE_S3_BUCKET:-}
      APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-us-east-1}
      APP_STORAGE_S3_KEY_PREFIX: ${APP_STORAGE_S3_KEY_PREFIX:-adjuntos/}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: politicas-negocio-frontend:local
    container_name: politicas-negocio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      FRONTEND_API_UPSTREAM: ${FRONTEND_API_UPSTREAM:-backend:8080}
      API_BASE_URL: ${API_BASE_URL:-}
    ports:
      - "4200:80"
    networks:
      - app-network

volumes:
  backend_uploads:

networks:
  app-network:
    driver: bridge
