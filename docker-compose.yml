name: politicas-negocio-frontend-local

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: politicas-negocio-frontend:local
    container_name: politicas-negocio-frontend
    restart: unless-stopped
    environment:
      FRONTEND_API_UPSTREAM: ${FRONTEND_API_UPSTREAM:-host.docker.internal:8080}
      API_BASE_URL: ${API_BASE_URL:-}
    ports:
      - "4200:80"
